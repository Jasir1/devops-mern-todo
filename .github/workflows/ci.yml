name: MERN CI
on:
  push:
    branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  mongo-init:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Wait for MongoDB to be healthy
        run: |
          until nc -z localhost 27017; do
            echo "Waiting for MongoDB to be healthy..."
            sleep 2
          done
            echo "MongoDB is up!"

      - name: Seed MongoDB with initial data
        working-directory: ./backend
        run: |
          npm install
          node seedTaskData.js

  test:
    runs-on: ubuntu-latest
    needs: mongo-init

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies for backend
        working-directory: ./backend
        run: npm install

      - name: Run Backend tests
        working-directory: ./backend
        run: npm test